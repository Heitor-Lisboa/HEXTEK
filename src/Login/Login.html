<body>

    <header id="cabeca">
        <div class="inscrever">
            <p>Não tem uma conta? </p>
            <a href="">Inscreva-se</a>
        </div>
        <div class="toggle-container">
            <span>🌙</span>
            <label class="toggle-switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
            <span>🌞</span>
        </div>
    </header>

    <div class="tela">

        <section id="login">

            <div class="telaLogin">

                <h1>FAÇA LOGIN NO <span style="text-decoration: underline white">HEXTEK</span></h1>

                <h3>E OUÇA O MELHOR DA MÚSICA INTERNACIONAL</h3>
                <hr>

                <form action="" id="resposta">
                    <p>Digite seu Email</p>

                    <input type="text" id="email" placeholder="Hextek3@gmail.com">

                    <p>Defina uma senha</p>

                    <input type="password" id="senha" placeholder="Hextek123">

                    <div class="termos">

                        <p>Aceite nossos</p> <a href="">Termos de Serviço</a>

                        <input type="checkbox" name="" id="aceitar">

                        <label for="aceitar" class="toggle"><span></span></label>

                    </div>

                    <a href="../Home/Home.html"><input type="button" class="mandar" role="button" value="Login" id="mandar"
                            disabled></a>
            </div>
            </form>
            <h5>Trabalho de Kaiser Silva, Heitor Lisboa e Antônio Phillipe</h5>

        </section>
    </div>

    <script src="Login.js"></script>
